services:
  - type: web
    name: aria-backend
    env: node
    rootDir: aria/backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
